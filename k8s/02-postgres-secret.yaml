# NOTE: For real deployments, do not commit secrets to git.
# Use sealed-secrets, SOPS, or `kubectl create secret` from CLI.
# Values below are base64-encoded plain strings (echo -n 'value' | base64).
#   expense_user  -> ZXhwZW5zZV91c2Vy
#   changeme123   -> Y2hhbmdlbWUxMjM=
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: expense-logger
type: Opaque
data:
  POSTGRES_USER: ZXhwZW5zZV91c2Vy
  POSTGRES_PASSWORD: Y2hhbmdlbWUxMjM=
